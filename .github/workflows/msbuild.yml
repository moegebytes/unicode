name: MSBuild

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022

    strategy:
      matrix:
        build_configuration: ["Release", "Debug"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3

    - name: Build
      working-directory: ${{github.workspace}}
      run: msbuild /m /p:Configuration=${{matrix.build_configuration}} .

    - name: Prepare binaries for upload
      run: mv bin\${{matrix.build_configuration}}-x86\*.dll,bin\${{matrix.build_configuration}}-x86\*.pdb .

    - name: Upload artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: ${{matrix.build_configuration}}-${{github.sha}}
        path: |
          *.dll
          *.pdb